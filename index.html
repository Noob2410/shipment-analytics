<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Отгрузка курьеров онлайн</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--text:#172033;--muted:#667085;--line:#d9dee7;--blue:#1f4e78;--green:#d9ead3;--yellow:#fff2cc;--red:#f4cccc;--shadow:0 10px 24px rgba(16,24,40,.08);--radius:18px}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:20;background:#172033;color:white;padding:14px 18px;box-shadow:0 4px 18px rgba(0,0,0,.14)}
.topbar{max-width:1800px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
h1{font-size:20px;margin:0}.date-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:8px 12px;border-radius:999px;font-weight:800}.status{font-size:13px;color:#d0d5dd}.toast{position:fixed;left:50%;top:84px;transform:translateX(-50%);background:#172033;color:#fff;padding:14px 18px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:9999;font-weight:800;max-width:92%;text-align:center;display:none}.toast.show{display:block}.chart-wrap{position:relative;overflow-x:auto}.chart-tooltip{position:absolute;display:none;background:#172033;color:white;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700;box-shadow:0 10px 24px rgba(0,0,0,.22);pointer-events:none;z-index:5;min-width:170px}.chart-tooltip .muted{color:#d0d5dd;font-weight:600}.chart-tooltip.show{display:block}
main{max-width:1800px;margin:18px auto 40px;padding:0 14px}.page{display:none}.page.active{display:block}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
button,.btn{border:0;border-radius:12px;padding:10px 14px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:40px;font-size:15px}
button.light,.btn.light{background:#fff;color:var(--text);border:1px solid var(--line)}button.danger{background:#b42318}
button.icon-delete{width:28px;height:28px;min-height:28px;padding:0;border-radius:999px;background:#fff;color:#b42318;border:1px solid #f0b8b2;font-size:18px}
.routes-grid{display:grid;grid-template-columns:repeat(5,minmax(345px,1fr));gap:10px;align-items:start}
.route-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.route-head{padding:12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}
.route-head a{font-size:17px;font-weight:900;color:var(--text);text-decoration:none;border-bottom:2px solid transparent}.route-head a:hover{border-bottom-color:var(--blue)}
.route-kpi{font-size:12px;color:var(--muted);white-space:nowrap}.route-20 .route-head{background:#d9ead3}.route-21 .route-head{background:#cfe2f3}.route-927 .route-head{background:#fce5cd}.route-24-936 .route-head{background:#f4cccc}.route-11-911 .route-head{background:#ead1dc}
table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{border-bottom:1px solid var(--line);padding:6px 3px;text-align:center;font-size:13px}
th{background:#f8fafc;color:#344054;font-size:11px;text-transform:uppercase;letter-spacing:.02em}.col-num{width:30px}.col-time{width:112px}.col-duration{width:64px}.col-delete{width:32px}td.num{color:var(--muted)}
.time-pair{display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap}.time-part{width:42px;border:1px solid var(--line);border-radius:9px;padding:7px 3px;text-align:center;background:#fff;font-size:15px;font-weight:800}.time-part:focus{outline:2px solid rgba(31,78,120,.25);border-color:#1f4e78}.colon{font-weight:900;color:#667085}
.duration{font-weight:900;border-radius:10px;white-space:nowrap;padding:5px 3px}.good{background:var(--green)}.warn{background:var(--yellow)}.bad{background:var(--red)}.empty{color:#98a2b3}
.route-foot{padding:10px 12px;display:flex;gap:8px;justify-content:space-between;align-items:center;background:#fbfcfe}.mini{color:var(--muted);font-size:13px}
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px;margin:14px 0}.stat,.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.stat{padding:16px}.panel{padding:16px;margin:12px 0}.stat .label{color:var(--muted);font-size:13px;margin-bottom:8px}.stat .value{font-size:28px;font-weight:900}
canvas{width:100%;height:320px;border:1px solid var(--line);border-radius:14px;background:#fff}.kpi-row,.filters{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 0;align-items:end}.badge{border-radius:999px;padding:7px 10px;font-size:13px;font-weight:800;border:1px solid var(--line)}.badge.good{background:var(--green)}.badge.warn{background:var(--yellow)}.badge.bad{background:var(--red)}
.data-table th,.data-table td{text-align:left}.data-table td:last-child,.data-table th:last-child{text-align:center}input[type=date],select{border:1px solid var(--line);border-radius:10px;padding:9px 10px;background:#fff;color:var(--text);font-weight:700}.filter{display:flex;flex-direction:column;gap:4px;color:var(--muted);font-size:13px;font-weight:800}
@media(max-width:1800px){.routes-grid{grid-template-columns:repeat(3,minmax(345px,1fr))}}@media(max-width:1180px){.routes-grid{grid-template-columns:repeat(2,minmax(345px,1fr))}.topbar{align-items:flex-start}canvas{height:300px}}@media(max-width:760px){main{padding:0 8px;margin-top:10px}header{position:static;padding:12px 10px}h1{font-size:17px}.status{width:100%;font-size:12px}.date-pill{font-size:13px}.actions{gap:8px}.btn,button{font-size:14px;padding:9px 11px}.routes-grid,.stats-grid{grid-template-columns:1fr}.route-card{border-radius:14px}.route-head{padding:10px}.route-head a{font-size:15px}.route-kpi{font-size:11px}th,td{font-size:12px;padding:5px 2px}.col-num{width:28px}.col-time{width:100px}.col-duration{width:60px}.col-delete{width:30px}.time-part{width:39px;font-size:15px;padding:7px 2px}.route-foot{padding:9px 10px}.stat .value{font-size:23px}canvas{height:260px;min-width:620px}.panel{padding:12px}.data-table{min-width:760px}.filters{align-items:stretch}.filter{width:100%}input[type=date],select{width:100%}}
</style>
</head>
<body>
<header><div class="topbar"><h1>Отгрузка курьеров онлайн</h1><div id="syncStatus" class="status">Подключение...</div><div id="todayLabel" class="date-pill">Дата</div></div></header>
<div id="toast" class="toast"></div>
<main>
<section id="inputPage" class="page active"><div class="actions"><a class="btn" href="#overall">Общая статистика</a><a class="btn light" href="#history">История</a><button class="danger" id="clearTodayBtn">Очистить сегодняшний день</button></div><div id="routesGrid" class="routes-grid"></div></section>
<section id="routePage" class="page"><div class="actions"><a class="btn light" href="#">← Назад к вводу</a><a class="btn" href="#overall">Общая статистика</a><a class="btn light" href="#history">История</a></div><div id="routeAnalytics"></div></section>
<section id="overallPage" class="page"><div class="actions"><a class="btn light" href="#">← Назад к вводу</a><a class="btn light" href="#history">История</a><button class="light" id="exportCsvBtn">Скачать CSV</button></div><div id="overallAnalytics"></div></section>
<section id="historyPage" class="page"><div class="actions"><a class="btn light" href="#">← Назад к вводу</a><button class="danger" id="fullResetBtn" title="Удалить всю историю после ввода логина и пароля">Общий сброс</button></div><div id="historyBlock"></div></section>
</main>
<script>
const SUPABASE_URL="https://zbylwxmzkqyovpsymsje.supabase.co";
const SUPABASE_KEY="sb_publishable_bg_8lAtn1L62tRM0q7_XiQ__UzwoilL";
const TABLE_NAME="sklad-routes";
const ROUTES=[{id:"20",title:"Маршрут 20",cls:"route-20"},{id:"21",title:"Маршрут 21",cls:"route-21"},{id:"927",title:"Маршрут 927",cls:"route-927"},{id:"24/936",title:"Маршрут 24/936",cls:"route-24-936"},{id:"11/911",title:"Маршрут 11/911",cls:"route-11-911"}];
let DATA={},ALL_ROWS=[],SAVE_TIMER=null;
function pad(n){return String(n).padStart(2,"0")}function todayKey(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function niceDate(k){const [y,m,d]=k.split("-");return `${d}.${m}.${y}`}function isoDaysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function dateDiffDays(from,to){if(!from||!to)return 0;const a=new Date(from+"T00:00:00"),b=new Date(to+"T00:00:00");return Math.floor((b-a)/86400000)+1}
function validPeriod(from,to){const days=dateDiffDays(from,to);return Boolean(from&&to&&from<=to&&days>=7&&days<=62)}
function defaultFrom(){return isoDaysAgo(29)}
function defaultTo(){return todayKey()}
function setStatus(t){document.getElementById("syncStatus").textContent=t}function showInfo(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.classList.remove("show"),3200)}
function emptyRow(){return{inH:"",inM:"",outH:"",outM:""}}function cleanDigits(v){return String(v||"").replace(/\D/g,"").slice(0,2)}function validPart(v,t){v=cleanDigits(v);if(v==="")return"";let n=Number(v);if(t==="h"&&n>23)n=23;if(t==="m"&&n>59)n=59;if(n<0)n=0;return pad(n)}
function rowTime(r,s){const h=r[s+"H"],m=r[s+"M"];return h!==""&&m!==""?`${pad(Number(h))}:${pad(Number(m))}`:""}function minutesBetween(a,b){if(!a||!b)return null;const[sh,sm]=a.split(":").map(Number),[eh,em]=b.split(":").map(Number);let x=sh*60+sm,y=eh*60+em;if(y<x)y+=1440;return y-x}function rowDuration(r){return minutesBetween(rowTime(r,"in"),rowTime(r,"out"))}
function fmtMin(v){if(v===null||v===undefined||Number.isNaN(v))return"—";const h=Math.floor(v/60),m=Math.round(v%60);return h?`${h}:${pad(m)}`:`${m} мин`}function kpiClass(v){if(v===null||v===undefined)return"empty";if(v<=40)return"good";if(v<=60)return"warn";return"bad"}function kpiText(v){if(v===null||v===undefined)return"—";if(v<=40)return"≤40";if(v<=60)return"40–60";return">60"}function splitTime(t){if(!t||!t.includes(":"))return["",""];const[h,m]=t.split(":");return[pad(Number(h)||0),pad(Number(m)||0)]}function ensureDay(d){DATA[d] ||= {};ROUTES.forEach(r=>DATA[d][r.id] ||= [])}
async function api(path,opt={}){const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...opt,headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal",...(opt.headers||{})}});if(!res.ok)throw new Error(await res.text());if(res.status===204)return null;const txt=await res.text();return txt?JSON.parse(txt):null}
function toData(rows){const d={};rows.forEach(r=>{d[r.date] ||= {};d[r.date][r.route] ||= [];const[ih,im]=splitTime(r.in_time),[oh,om]=splitTime(r.out_time);d[r.date][r.route].push({inH:ih,inM:im,outH:oh,outM:om})});Object.keys(d).forEach(k=>ROUTES.forEach(r=>d[k][r.id] ||= []));return d}
async function loadRemote(){setStatus("Загрузка...");const from=isoDaysAgo(61);const rows=await api(`${encodeURIComponent(TABLE_NAME)}?select=*&date=gte.${from}&order=date.asc,route.asc,courier_index.asc`);ALL_ROWS=rows||[];DATA=toData(ALL_ROWS);setStatus("Онлайн: данные загружены")}
function completedPayload(d,route){ensureDay(d);return(DATA[d][route]||[]).map((row,i)=>({row,i})).filter(x=>rowDuration(x.row)!==null).map(x=>({date:d,route:route,courier_index:x.i+1,in_time:rowTime(x.row,"in"),out_time:rowTime(x.row,"out"),duration_minutes:rowDuration(x.row)}))}
async function syncRoute(d,route){setStatus("Сохранение...");await api(`${encodeURIComponent(TABLE_NAME)}?date=eq.${d}&route=eq.${encodeURIComponent(route)}`,{method:"DELETE"});const p=completedPayload(d,route);if(p.length)await api(`${encodeURIComponent(TABLE_NAME)}`,{method:"POST",body:JSON.stringify(p)});await loadRemote();setStatus("Онлайн: сохранено")}
function scheduleSync(route){clearTimeout(SAVE_TIMER);const d=todayKey();SAVE_TIMER=setTimeout(()=>syncRoute(d,route).catch(e=>{console.error(e);setStatus("Ошибка сохранения: проверь DELETE policy");showInfo("Ошибка сохранения: проверь DELETE policy в Supabase")}),450)}
function partInput(route,i,key,val,type){return `<input class="time-part" inputmode="numeric" autocomplete="off" maxlength="2" placeholder="00" value="${val||""}" data-route="${route}" data-index="${i}" data-key="${key}" data-type="${type}">`}function timePair(route,i,row,side){return `<div class="time-pair">${partInput(route,i,side+"H",row[side+"H"],"h")}<span class="colon">:</span>${partInput(route,i,side+"M",row[side+"M"],"m")}</div>`}
function renderInput(){const d=todayKey();document.getElementById("todayLabel").textContent=`Сегодня: ${niceDate(d)}`;ensureDay(d);const grid=document.getElementById("routesGrid");grid.innerHTML="";ROUTES.forEach(route=>{const rows=DATA[d][route.id];while(rows.length<5)rows.push(emptyRow());const comp=rows.map(rowDuration).filter(x=>x!==null),avg=comp.length?comp.reduce((s,x)=>s+x,0)/comp.length:null;const card=document.createElement("article");card.className=`route-card ${route.cls}`;card.innerHTML=`<div class="route-head"><a href="#route/${encodeURIComponent(route.id)}">${route.title}</a><div class="route-kpi" data-kpi-route="${route.id}">Среднее: ${fmtMin(avg)}</div></div><table><colgroup><col class="col-num"><col class="col-time"><col class="col-time"><col class="col-duration"><col class="col-delete"></colgroup><thead><tr><th>№</th><th>Прибытие</th><th>Убытие</th><th>Время</th><th></th></tr></thead><tbody></tbody></table><div class="route-foot"><button class="light clear-route" data-clear-route="${route.id}">Очистить маршрут</button><span class="mini">Заполнено: <span data-filled-route="${route.id}">${comp.length}</span></span></div>`;const tb=card.querySelector("tbody");rows.forEach((row,i)=>{const min=rowDuration(row),tr=document.createElement("tr");tr.innerHTML=`<td class="num">${i+1}</td><td>${timePair(route.id,i,row,"in")}</td><td>${timePair(route.id,i,row,"out")}</td><td><span class="duration ${kpiClass(min)}" data-duration-route="${route.id}" data-duration-index="${i}">${fmtMin(min)}</span></td><td><button class="icon-delete" data-delete-route="${route.id}" data-delete-index="${i}">×</button></td>`;tb.appendChild(tr)});grid.appendChild(card)});bindInputs();bindDeleteButtons();bindClearRouteButtons()}
function updateVisual(route,i){const d=todayKey();ensureDay(d);const rows=DATA[d][route]||[],row=rows[i]||emptyRow(),min=rowDuration(row);const dur=document.querySelector(`[data-duration-route="${route}"][data-duration-index="${i}"]`);if(dur){dur.textContent=fmtMin(min);dur.className=`duration ${kpiClass(min)}`}const comp=rows.map(rowDuration).filter(x=>x!==null),avg=comp.length?comp.reduce((s,x)=>s+x,0)/comp.length:null;const k=document.querySelector(`[data-kpi-route="${route}"]`);if(k)k.textContent=`Среднее: ${fmtMin(avg)}`;const f=document.querySelector(`[data-filled-route="${route}"]`);if(f)f.textContent=comp.length}
function bindInputs(){document.querySelectorAll(".time-part").forEach(inp=>{inp.addEventListener("input",e=>{const el=e.target;el.value=cleanDigits(el.value);savePart(el,false);if(el.value.length>=2)moveNext(el)});inp.addEventListener("blur",e=>savePart(e.target,true));inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();savePart(e.target,true);moveNext(e.target)}})})}
function moveNext(el){const route=el.dataset.route,i=Number(el.dataset.index),key=el.dataset.key,order=["inH","inM","outH","outM"];let pos=order.indexOf(key),nextKey,nextI=i;if(pos<3)nextKey=order[pos+1];else{nextI=i+1;nextKey="inH"}const next=document.querySelector(`.time-part[data-route="${route}"][data-index="${nextI}"][data-key="${nextKey}"]`);if(next){next.focus();next.select()}}
function savePart(el,format){const d=todayKey();ensureDay(d);const route=el.dataset.route,i=Number(el.dataset.index),key=el.dataset.key,type=el.dataset.type;DATA[d][route][i] ||= emptyRow();const val=format?validPart(el.value,type):cleanDigits(el.value);DATA[d][route][i][key]=val;el.value=val;updateVisual(route,i);if(format){maybeAutoAdd(route,i);if(rowDuration(DATA[d][route][i])!==null){scheduleSync(route)}}}
function maybeAutoAdd(route,i){const d=todayKey(),rows=DATA[d][route],r=rows[i];if(i===rows.length-1&&r.inH!==""&&r.inM!==""&&r.outH!==""&&r.outM!==""){rows.push(emptyRow());renderInput();const next=document.querySelector(`.time-part[data-route="${route}"][data-index="${i+1}"][data-key="inH"]`);if(next){next.focus();next.select()}}}
function bindDeleteButtons(){const d=todayKey();document.querySelectorAll("[data-delete-route]").forEach(btn=>btn.onclick=e=>{const route=e.currentTarget.dataset.deleteRoute,i=Number(e.currentTarget.dataset.deleteIndex),r=DATA[d][route][i]||emptyRow();if(Object.values(r).some(Boolean)&&!confirm(`Удалить строку №${i+1}?`))return;DATA[d][route].splice(i,1);if(DATA[d][route].length<5)DATA[d][route].push(emptyRow());renderInput();scheduleSync(route)})}
function bindClearRouteButtons(){const d=todayKey();document.querySelectorAll("[data-clear-route]").forEach(btn=>btn.onclick=e=>{const route=e.currentTarget.dataset.clearRoute;if(!confirm("Очистить маршрут за сегодня?"))return;DATA[d][route]=[emptyRow(),emptyRow(),emptyRow(),emptyRow(),emptyRow()];renderInput();scheduleSync(route)})}
function flatRecords(route=null,from=isoDaysAgo(61),to=todayKey()){return ALL_ROWS.filter(r=>r.date>=from&&r.date<=to).filter(r=>!route||r.route===route).map(r=>({date:r.date,routeId:r.route,routeTitle:ROUTES.find(x=>x.id===r.route)?.title||r.route,index:r.courier_index,in:r.in_time,out:r.out_time,min:r.duration_minutes}))}
function calcStats(rows){const count=rows.length,total=rows.reduce((s,r)=>s+r.min,0),avg=count?total/count:null;const green=rows.filter(r=>r.min<=40).length,yellow=rows.filter(r=>r.min>40&&r.min<=60).length,red=rows.filter(r=>r.min>60).length,min=count?Math.min(...rows.map(r=>r.min)):null,max=count?Math.max(...rows.map(r=>r.min)):null,sla=count?Math.round(((green+yellow)/count)*100):0;return{count,total,avg,green,yellow,red,min,max,sla}}
function dailyAverage(rows){const m={};rows.forEach(r=>{m[r.date]||=[];m[r.date].push(r.min)});return Object.keys(m).sort().map(date=>({date,avg:m[date].reduce((s,x)=>s+x,0)/m[date].length,count:m[date].length}))}
function statsCards(s){return `<div class="stats-grid"><div class="stat"><div class="label">Курьеров</div><div class="value">${s.count}</div></div><div class="stat"><div class="label">Среднее время</div><div class="value">${fmtMin(s.avg)}</div></div><div class="stat"><div class="label">Общее время</div><div class="value">${fmtMin(s.total)}</div></div><div class="stat"><div class="label">KPI ≤60 мин</div><div class="value">${s.sla}%</div></div></div><div class="kpi-row"><span class="badge good">≤40 мин: ${s.green}</span><span class="badge warn">41–60 мин: ${s.yellow}</span><span class="badge bad">>60 мин: ${s.red}</span><span class="badge">Мин: ${fmtMin(s.min)}</span><span class="badge">Макс: ${fmtMin(s.max)}</span></div>`}
function periodControls(prefix,from,to){
  return `<div class="filters">
    <label class="filter">С даты<input type="date" id="${prefix}From" min="${isoDaysAgo(61)}" max="${todayKey()}" value="${from}"></label>
    <label class="filter">По дату<input type="date" id="${prefix}To" min="${isoDaysAgo(61)}" max="${todayKey()}" value="${to}"></label>
    <button class="light" id="${prefix}Apply">Показать</button>
  </div>`;
}
function bindPeriod(prefix,onApply){
  const fromEl=document.getElementById(`${prefix}From`);
  const toEl=document.getElementById(`${prefix}To`);
  const apply=document.getElementById(`${prefix}Apply`);
  apply.onclick=()=>{
    const from=fromEl.value,to=toEl.value;
    if(!validPeriod(from,to)){
      showInfo("Выберите период более 7 дней, но не более 62 дней");
      return;
    }
    onApply(from,to);
  };
}
function drawLineChart(canvas,points,title){
  const ctx=canvas.getContext("2d"),ratio=devicePixelRatio||1;
  canvas.width=canvas.clientWidth*ratio;
  canvas.height=canvas.clientHeight*ratio;
  ctx.scale(ratio,ratio);
  const W=canvas.clientWidth,H=canvas.clientHeight;
  ctx.clearRect(0,0,W,H);
  ctx.font="14px system-ui";
  ctx.fillStyle="#172033";
  ctx.fillText(title,18,26);

  const tooltip=canvas.parentElement.querySelector(".chart-tooltip");
  canvas.__chartPoints=[];

  if(!points.length){
    ctx.fillStyle="#98a2b3";
    ctx.font="22px system-ui";
    ctx.fillText("Нет данных для графика",54,120);
    if(tooltip) tooltip.classList.remove("show");
    return;
  }

  const pL=54,pR=18,pT=44,pB=54,pW=W-pL-pR,pH=H-pT-pB;
  const maxY=Math.max(70,Math.ceil(Math.max(...points.map(p=>p.avg))/10)*10);

  ctx.strokeStyle="#d9dee7";
  ctx.lineWidth=1;
  ctx.font="12px system-ui";
  for(let i=0;i<=4;i++){
    let y=pT+pH/4*i;
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(W-pR,y);
    ctx.stroke();
    ctx.fillStyle="#667085";
    ctx.fillText(String(Math.round(maxY-(maxY/4)*i)),14,y+4);
  }

  const xFor=i=>points.length===1?pL+pW/2:pL+(pW/(points.length-1))*i;
  const yFor=v=>pT+pH-(v/maxY)*pH;

  ctx.strokeStyle="#1f4e78";
  ctx.lineWidth=3;
  ctx.beginPath();
  points.forEach((p,i)=>{
    const x=xFor(i),y=yFor(p.avg);
    if(i)ctx.lineTo(x,y);else ctx.moveTo(x,y);
  });
  ctx.stroke();

  ctx.fillStyle="#1f4e78";
  points.forEach((p,i)=>{
    const x=xFor(i),y=yFor(p.avg);
    canvas.__chartPoints.push({x,y,date:p.date,avg:p.avg,count:p.count||0});
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle="#667085";
  ctx.font="11px system-ui";
  const labelStep=Math.max(1,Math.ceil(points.length/8));
  points.forEach((p,i)=>{
    if(i%labelStep===0 || i===points.length-1){
      const x=xFor(i);
      ctx.save();
      ctx.translate(x,H-18);
      ctx.rotate(-0.35);
      ctx.fillText(niceDate(p.date).slice(0,5),-13,0);
      ctx.restore();
    }
  });

  const showTip=(event)=>{
    if(!tooltip || !canvas.__chartPoints.length) return;
    const rect=canvas.getBoundingClientRect();
    const clientX=event.touches?event.touches[0].clientX:event.clientX;
    const clientY=event.touches?event.touches[0].clientY:event.clientY;
    const mx=clientX-rect.left,my=clientY-rect.top;
    let nearest=null,best=99999;
    canvas.__chartPoints.forEach(p=>{
      const d=Math.hypot(mx-p.x,my-p.y);
      if(d<best){best=d;nearest=p;}
    });
    if(!nearest || best>22){
      tooltip.classList.remove("show");
      return;
    }
    tooltip.innerHTML=`<div>${niceDate(nearest.date)}</div><div class="muted">Среднее: ${fmtMin(nearest.avg)}</div><div class="muted">Курьеров: ${nearest.count}</div><div class="muted">KPI: ${kpiText(nearest.avg)}</div>`;
    const left=Math.min(Math.max(nearest.x+12,8),rect.width-190);
    const top=Math.max(nearest.y-72,8);
    tooltip.style.left=left+"px";
    tooltip.style.top=top+"px";
    tooltip.classList.add("show");
  };

  canvas.onmousemove=showTip;
  canvas.ontouchstart=showTip;
  canvas.ontouchmove=showTip;
  canvas.onmouseleave=()=>{if(tooltip)tooltip.classList.remove("show");};
  canvas.ontouchend=()=>setTimeout(()=>tooltip&&tooltip.classList.remove("show"),1300);
}

function renderRouteAnalytics(route,from=defaultFrom(),to=defaultTo()){const rt=ROUTES.find(r=>r.id===route),rows=flatRecords(route,from,to),stats=calcStats(rows),daily=dailyAverage(rows);document.getElementById("routeAnalytics").innerHTML=`<div class="panel"><h2>${rt.title}: аналитика</h2>${periodControls("routePeriod",from,to)}${statsCards(stats)}</div><div class="panel chart-wrap"><canvas id="routeChart"></canvas><div id="routeChartTooltip" class="chart-tooltip"></div></div><div class="panel"><h3>История</h3>${historyTable(rows)}</div>`;bindPeriod("routePeriod",(f,t)=>renderRouteAnalytics(route,f,t));drawLineChart(document.getElementById("routeChart"),daily,`Среднее время по дням — ${rt.title}`)}
function renderOverall(from=defaultFrom(),to=defaultTo()){const rows=flatRecords(null,from,to),stats=calcStats(rows),daily=dailyAverage(rows),by=ROUTES.map(route=>({route,stats:calcStats(rows.filter(r=>r.routeId===route.id))}));document.getElementById("overallAnalytics").innerHTML=`<div class="panel"><h2>Общая статистика</h2>${periodControls("overallPeriod",from,to)}${statsCards(stats)}</div><div class="panel chart-wrap"><canvas id="overallChart"></canvas><div id="overallChartTooltip" class="chart-tooltip"></div></div><div class="panel"><h3>Сводка по маршрутам</h3><table class="data-table"><thead><tr><th>Маршрут</th><th>Курьеров</th><th>Среднее</th><th>Общее</th><th>≤40</th><th>41–60</th><th>>60</th><th>KPI</th></tr></thead><tbody>${by.map(x=>`<tr><td><a href="#route/${encodeURIComponent(x.route.id)}">${x.route.title}</a></td><td>${x.stats.count}</td><td>${fmtMin(x.stats.avg)}</td><td>${fmtMin(x.stats.total)}</td><td>${x.stats.green}</td><td>${x.stats.yellow}</td><td>${x.stats.red}</td><td>${x.stats.sla}%</td></tr>`).join("")}</tbody></table></div>`;bindPeriod("overallPeriod",(f,t)=>renderOverall(f,t));drawLineChart(document.getElementById("overallChart"),daily,"Общее среднее время по дням")}
function historyTable(rows){return `<table class="data-table"><thead><tr><th>Дата</th><th>Маршрут</th><th>Курьер №</th><th>Прибытие</th><th>Убытие</th><th>Время</th><th>KPI</th></tr></thead><tbody>${rows.slice().reverse().map(r=>`<tr><td>${niceDate(r.date)}</td><td>${r.routeTitle}</td><td>${r.index}</td><td>${r.in}</td><td>${r.out}</td><td>${fmtMin(r.min)}</td><td><span class="badge ${kpiClass(r.min)}">${kpiText(r.min)}</span></td></tr>`).join("")||`<tr><td colspan="7">Нет данных</td></tr>`}</tbody></table>`}
function renderHistory(){const t=todayKey();document.getElementById("historyBlock").innerHTML=`<div class="panel"><h2>История за день</h2><div class="filters"><label class="filter">Дата<input type="date" id="historyDate" min="${isoDaysAgo(61)}" max="${t}" value="${t}"></label><label class="filter">Маршрут<select id="historyRoute"><option value="">Все</option>${ROUTES.map(r=>`<option value="${r.id}">${r.title}</option>`).join("")}</select></label></div><div id="historyTable"></div></div>`;const refresh=()=>{let d=document.getElementById("historyDate").value,r=document.getElementById("historyRoute").value,rows=flatRecords(null,isoDaysAgo(61),todayKey()).filter(x=>x.date===d);if(r)rows=rows.filter(x=>x.routeId===r);document.getElementById("historyTable").innerHTML=historyTable(rows)};document.getElementById("historyDate").onchange=refresh;document.getElementById("historyRoute").onchange=refresh;refresh()}
function csvEscape(v){const s=String(v??"");return `"${s.replace(/"/g,'""')}"`}function exportCSV(){const rows=flatRecords(null,isoDaysAgo(61),todayKey()),head=["Дата","Маршрут","Курьер №","Прибытие","Убытие","Время отгрузки, мин","KPI"],lines=[head.map(csvEscape).join(";")];rows.forEach(r=>lines.push([niceDate(r.date),r.routeTitle,r.index,r.in,r.out,r.min,kpiText(r.min)].map(csvEscape).join(";")));const blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`sklad-routes-${todayKey()}.csv`;a.click();URL.revokeObjectURL(a.href)}
async function showPage(){const hash=location.hash.replace(/^#/,"");document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));if(hash.startsWith("route/")){document.getElementById("routePage").classList.add("active");renderRouteAnalytics(decodeURIComponent(hash.split("/")[1]))}else if(hash==="overall"){document.getElementById("overallPage").classList.add("active");renderOverall()}else if(hash==="history"){document.getElementById("historyPage").classList.add("active");renderHistory()}else{document.getElementById("inputPage").classList.add("active");renderInput()}}
document.getElementById("clearTodayBtn").onclick=async()=>{if(!confirm("Очистить все данные за сегодняшний день?"))return;const d=todayKey();ensureDay(d);for(const r of ROUTES){DATA[d][r.id]=[];await syncRoute(d,r.id)}renderInput()}

async function fullResetHistory(){
  const login=prompt("Введите логин");
  if(login===null) return;
  const password=prompt("Введите пароль");
  if(password===null) return;
  if(login!=="156783" || password!=="156783"){
    showInfo("Вы не имеете прав сбрасывать историю");
    return;
  }
  if(!confirm("Вы точно хотите удалить всю историю за все время? Это действие нельзя отменить.")) return;
  try{
    setStatus("Удаление всей истории...");
    await api(`${encodeURIComponent(TABLE_NAME)}?date=not.is.null`,{method:"DELETE"});
    ALL_ROWS=[];
    DATA={};
    await loadRemote();
    setStatus("История полностью сброшена");
    showInfo("История полностью сброшена");
    showPage();
  }catch(e){
    console.error(e);
    setStatus("Ошибка общего сброса");
    showInfo("Ошибка сброса: проверь DELETE policy в Supabase");
  }
}
document.getElementById("fullResetBtn").onclick=fullResetHistory;

document.getElementById("exportCsvBtn").onclick=exportCSV;window.addEventListener("hashchange",showPage);window.addEventListener("resize",()=>{const h=location.hash.replace(/^#/,"");if(h.startsWith("route/"))renderRouteAnalytics(decodeURIComponent(h.split("/")[1]));if(h==="overall")renderOverall()});
(async()=>{try{await loadRemote();showPage()}catch(e){console.error(e);setStatus("Ошибка подключения: проверь key/RLS/DELETE policy")}})();
</script>
