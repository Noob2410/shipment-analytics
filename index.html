<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Отгрузка курьеров по маршрутам</title>
  <meta name="theme-color" content="#172033" />
  <style>
    :root{--bg:#f4f6f8;--card:#fff;--text:#172033;--muted:#667085;--line:#d9dee7;--blue:#1f4e78;--green:#d9ead3;--yellow:#fff2cc;--red:#f4cccc;--shadow:0 10px 24px rgba(16,24,40,.08);--radius:18px}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:20;background:#172033;color:#fff;padding:14px 18px;box-shadow:0 4px 18px rgba(0,0,0,.14)}
    .topbar{max-width:1500px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap} h1{font-size:20px;margin:0}.date-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:8px 12px;border-radius:999px;font-weight:700;white-space:nowrap}
    main{max-width:1500px;margin:18px auto 40px;padding:0 14px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}button,.btn{border:0;border-radius:12px;padding:10px 14px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:40px}button.danger{background:#b42318}button.light,.btn.light{background:#fff;color:var(--text);border:1px solid var(--line)}.hint{color:var(--muted);font-size:14px;margin:4px 0 18px}
    .routes-grid{display:grid;grid-template-columns:repeat(5,minmax(260px,1fr));gap:12px;align-items:start}.route-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}.route-head{padding:12px;background:#e8eef5;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}.route-head a{font-size:17px;font-weight:900;color:var(--text);text-decoration:none;border-bottom:2px solid transparent}.route-head a:hover{border-bottom-color:var(--blue)}.route-kpi{font-size:12px;color:var(--muted);white-space:nowrap}
    table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{border-bottom:1px solid var(--line);padding:7px 6px;text-align:center;font-size:14px}th{background:#f8fafc;color:#344054;font-size:12px;text-transform:uppercase;letter-spacing:.03em}td.num{width:36px;color:var(--muted)}input[type="time"]{width:100%;border:1px solid var(--line);border-radius:10px;padding:8px 4px;text-align:center;background:#fff;font-size:14px}.duration{font-weight:800;border-radius:10px}.good{background:var(--green)}.warn{background:var(--yellow)}.bad{background:var(--red)}.empty{color:#98a2b3}.route-foot{padding:10px 12px;display:flex;gap:8px;justify-content:space-between;align-items:center;background:#fbfcfe}.mini{color:var(--muted);font-size:13px}
    .page{display:none}.page.active{display:block}.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px;margin:14px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}.stat .label{color:var(--muted);font-size:13px;margin-bottom:8px}.stat .value{font-size:28px;font-weight:900}.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin:12px 0}.panel h2,.panel h3{margin:0 0 12px}canvas{width:100%;height:320px;border:1px solid var(--line);border-radius:14px;background:#fff}.kpi-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 0}.badge{border-radius:999px;padding:7px 10px;font-size:13px;font-weight:800;border:1px solid var(--line)}.data-table th,.data-table td{text-align:left}.data-table td:last-child,.data-table th:last-child{text-align:center}
    .route-20 .route-head{background:#d9ead3}.route-21 .route-head{background:#cfe2f3}.route-927 .route-head{background:#fce5cd}.route-24-936 .route-head{background:#f4cccc}.route-11-911 .route-head{background:#ead1dc}
    @media(max-width:1400px){.routes-grid{grid-template-columns:repeat(3,minmax(260px,1fr))}}@media(max-width:900px){.routes-grid,.stats-grid{grid-template-columns:1fr}header{position:static}canvas{height:260px}}
  </style>
</head>
<body>
<header><div class="topbar"><h1>Отгрузка курьеров по маршрутам</h1><div class="date-pill" id="todayLabel">Дата</div></div></header>
<main>
<section id="inputPage" class="page active"><div class="actions"><a class="btn" href="#overall">Общая статистика</a><button class="light" id="exportBtn">Скачать данные JSON</button><label class="btn light" for="importFile">Загрузить JSON</label><input id="importFile" type="file" accept="application/json" hidden><button class="danger" id="clearTodayBtn">Очистить сегодняшний день</button></div><p class="hint">Дата подтягивается автоматически с устройства. Вводить нужно только время прибытия и убытия. Строк добавляется сколько нужно.</p><div class="routes-grid" id="routesGrid"></div></section>
<section id="routePage" class="page"><div class="actions"><a class="btn light" href="#">← Назад к вводу</a><a class="btn" href="#overall">Общая статистика</a></div><div id="routeAnalytics"></div></section>
<section id="overallPage" class="page"><div class="actions"><a class="btn light" href="#">← Назад к вводу</a></div><div id="overallAnalytics"></div></section>
</main>
<script>
const ROUTES=[{id:"20",title:"Маршрут 20",cls:"route-20"},{id:"21",title:"Маршрут 21",cls:"route-21"},{id:"927",title:"Маршрут 927",cls:"route-927"},{id:"24/936",title:"Маршрут 24/936",cls:"route-24-936"},{id:"11/911",title:"Маршрут 11/911",cls:"route-11-911"}];
const STORAGE_KEY="skladCourierRouteData_v1";function pad(n){return String(n).padStart(2,"0")}function todayKey(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function niceDate(k){const [y,m,d]=k.split("-");return `${d}.${m}.${y}`}function loadData(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return {}}}function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}function ensureDay(d,k){d[k]||={};ROUTES.forEach(r=>d[k][r.id]||=[])}
function minutesBetween(s,e){if(!s||!e)return null;const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let a=sh*60+sm,b=eh*60+em;if(b<a)b+=1440;return b-a}function fmtMin(m){if(m===null||m===undefined||Number.isNaN(m))return "—";const h=Math.floor(m/60),mm=Math.round(m%60);return h>0?`${h}:${pad(mm)}`:`${mm} мин`}function kpiClass(m){if(m===null||m===undefined)return "empty";if(m<=40)return "good";if(m<=60)return "warn";return "bad"}function kpiText(m){if(m===null||m===undefined)return "—";if(m<=40)return "≤40";if(m<=60)return "40–60";return ">60"}
function flatRecords(routeId=null){const d=loadData(),rows=[];Object.keys(d).sort().forEach(date=>{ROUTES.forEach(route=>{if(routeId&&route.id!==routeId)return;(d[date][route.id]||[]).forEach((item,index)=>{const min=minutesBetween(item.in,item.out);if(min!==null)rows.push({date,routeId:route.id,routeTitle:route.title,index:index+1,in:item.in,out:item.out,min})})})});return rows}function calcStats(rows){const count=rows.length,total=rows.reduce((s,r)=>s+r.min,0),avg=count?total/count:null,green=rows.filter(r=>r.min<=40).length,yellow=rows.filter(r=>r.min>40&&r.min<=60).length,red=rows.filter(r=>r.min>60).length,min=count?Math.min(...rows.map(r=>r.min)):null,max=count?Math.max(...rows.map(r=>r.min)):null,sla=count?Math.round(((green+yellow)/count)*100):0;return{count,total,avg,green,yellow,red,min,max,sla}}function dailyAverage(rows){const map={};rows.forEach(r=>{map[r.date]||=[];map[r.date].push(r.min)});return Object.keys(map).sort().map(date=>({date,avg:map[date].reduce((s,x)=>s+x,0)/map[date].length}))}
function renderInput(){const dateKey=todayKey();document.getElementById("todayLabel").textContent=`Сегодня: ${niceDate(dateKey)}`;const data=loadData();ensureDay(data,dateKey);saveData(data);const grid=document.getElementById("routesGrid");grid.innerHTML="";ROUTES.forEach(route=>{const rows=data[dateKey][route.id];while(rows.length<5)rows.push({in:"",out:""});const completed=rows.map(x=>minutesBetween(x.in,x.out)).filter(x=>x!==null);const avg=completed.length?completed.reduce((s,x)=>s+x,0)/completed.length:null;const card=document.createElement("article");card.className=`route-card ${route.cls}`;card.innerHTML=`<div class="route-head"><a href="#route/${encodeURIComponent(route.id)}">${route.title}</a><div class="route-kpi">Среднее: ${fmtMin(avg)}</div></div><table><thead><tr><th style="width:38px">№</th><th>Прибытие</th><th>Убытие</th><th>Время</th></tr></thead><tbody></tbody></table><div class="route-foot"><button class="light add-row">+ Курьер</button><span class="mini">Заполнено: ${completed.length}</span></div>`;const tbody=card.querySelector("tbody");rows.forEach((row,i)=>{const min=minutesBetween(row.in,row.out);const tr=document.createElement("tr");tr.innerHTML=`<td class="num">${i+1}</td><td><input type="time" value="${row.in||""}" data-route="${route.id}" data-index="${i}" data-field="in"></td><td><input type="time" value="${row.out||""}" data-route="${route.id}" data-index="${i}" data-field="out"></td><td class="duration ${kpiClass(min)}">${fmtMin(min)}</td>`;tbody.appendChild(tr)});card.querySelector(".add-row").addEventListener("click",()=>{const d=loadData();ensureDay(d,dateKey);d[dateKey][route.id].push({in:"",out:""});saveData(d);renderInput()});grid.appendChild(card)});document.querySelectorAll('input[type="time"]').forEach(input=>{input.addEventListener("change",e=>{const d=loadData();ensureDay(d,dateKey);const{route,index,field}=e.target.dataset;d[dateKey][route][Number(index)][field]=e.target.value;saveData(d);renderInput()})})}
function statsCards(s){return `<div class="stats-grid"><div class="stat"><div class="label">Курьеров</div><div class="value">${s.count}</div></div><div class="stat"><div class="label">Среднее время</div><div class="value">${fmtMin(s.avg)}</div></div><div class="stat"><div class="label">Общее время</div><div class="value">${fmtMin(s.total)}</div></div><div class="stat"><div class="label">KPI ≤60 мин</div><div class="value">${s.sla}%</div></div></div><div class="kpi-row"><span class="badge good">≤40 мин: ${s.green}</span><span class="badge warn">41–60 мин: ${s.yellow}</span><span class="badge bad">>60 мин: ${s.red}</span><span class="badge">Мин: ${fmtMin(s.min)}</span><span class="badge">Макс: ${fmtMin(s.max)}</span></div>`}
function drawLineChart(canvas,points,title){const ctx=canvas.getContext("2d"),ratio=devicePixelRatio||1,w=canvas.width=canvas.clientWidth*ratio,h=canvas.height=canvas.clientHeight*ratio;ctx.scale(ratio,ratio);const W=canvas.clientWidth,H=canvas.clientHeight;ctx.clearRect(0,0,W,H);ctx.font="14px system-ui";ctx.fillStyle="#172033";ctx.fillText(title,18,26);const padL=54,padR=18,padT=44,padB=42,plotW=W-padL-padR,plotH=H-padT-padB;ctx.strokeStyle="#d9dee7";ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=padT+plotH/4*i;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke()}if(!points.length){ctx.fillStyle="#98a2b3";ctx.font="22px system-ui";ctx.fillText("Нет данных для графика",padL,padT+80);return}const maxY=Math.max(70,Math.ceil(Math.max(...points.map(p=>p.avg))/10)*10),minY=0;ctx.fillStyle="#667085";ctx.font="12px system-ui";for(let i=0;i<=4;i++){const val=Math.round(maxY-(maxY-minY)/4*i),y=padT+plotH/4*i;ctx.fillText(`${val}`,14,y+4)}const xFor=i=>points.length===1?padL+plotW/2:padL+plotW/(points.length-1)*i,yFor=v=>padT+plotH-((v-minY)/(maxY-minY))*plotH;ctx.strokeStyle="#1f4e78";ctx.lineWidth=3;ctx.beginPath();points.forEach((p,i)=>{const x=xFor(i),y=yFor(p.avg);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();ctx.fillStyle="#1f4e78";points.forEach((p,i)=>{ctx.beginPath();ctx.arc(xFor(i),yFor(p.avg),4,0,Math.PI*2);ctx.fill()});ctx.fillStyle="#667085";ctx.font="11px system-ui";const step=Math.max(1,Math.ceil(points.length/8));points.forEach((p,i)=>{if(i%step===0||i===points.length-1){ctx.save();ctx.translate(xFor(i),H-14);ctx.rotate(-.35);ctx.fillText(niceDate(p.date).slice(0,5),-12,0);ctx.restore()}})}
function renderRouteAnalytics(routeId){const route=ROUTES.find(r=>r.id===routeId),c=document.getElementById("routeAnalytics");if(!route){c.innerHTML='<div class="panel"><h2>Маршрут не найден</h2></div>';return}const rows=flatRecords(routeId),stats=calcStats(rows),daily=dailyAverage(rows);c.innerHTML=`<div class="panel"><h2>${route.title}: аналитика</h2>${statsCards(stats)}</div><div class="panel"><canvas id="routeChart"></canvas></div><div class="panel"><h3>Детальные данные</h3><table class="data-table"><thead><tr><th>Дата</th><th>Курьер №</th><th>Прибытие</th><th>Убытие</th><th>Время</th><th>KPI</th></tr></thead><tbody>${rows.slice().reverse().map(r=>`<tr><td>${niceDate(r.date)}</td><td>${r.index}</td><td>${r.in}</td><td>${r.out}</td><td>${fmtMin(r.min)}</td><td><span class="badge ${kpiClass(r.min)}">${kpiText(r.min)}</span></td></tr>`).join("")||'<tr><td colspan="6">Данных пока нет</td></tr>'}</tbody></table></div>`;drawLineChart(document.getElementById("routeChart"),daily,`Среднее время по дням — ${route.title}`)}
function renderOverall(){const rows=flatRecords(),stats=calcStats(rows),daily=dailyAverage(rows),byRoute=ROUTES.map(route=>({route,stats:calcStats(rows.filter(r=>r.routeId===route.id))}));document.getElementById("overallAnalytics").innerHTML=`<div class="panel"><h2>Общая статистика по всем маршрутам</h2>${statsCards(stats)}</div><div class="panel"><canvas id="overallChart"></canvas></div><div class="panel"><h3>Сводка по маршрутам</h3><table class="data-table"><thead><tr><th>Маршрут</th><th>Курьеров</th><th>Среднее</th><th>Общее время</th><th>≤40</th><th>41–60</th><th>>60</th><th>KPI ≤60</th></tr></thead><tbody>${byRoute.map(x=>`<tr><td><a href="#route/${encodeURIComponent(x.route.id)}">${x.route.title}</a></td><td>${x.stats.count}</td><td>${fmtMin(x.stats.avg)}</td><td>${fmtMin(x.stats.total)}</td><td>${x.stats.green}</td><td>${x.stats.yellow}</td><td>${x.stats.red}</td><td>${x.stats.sla}%</td></tr>`).join("")}</tbody></table></div>`;drawLineChart(document.getElementById("overallChart"),daily,"Общее среднее время всех курьеров по дням")}
function showPage(){const hash=location.hash.replace(/^#/,"");document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));if(hash.startsWith("route/")){document.getElementById("routePage").classList.add("active");renderRouteAnalytics(decodeURIComponent(hash.split("/")[1]))}else if(hash==="overall"){document.getElementById("overallPage").classList.add("active");renderOverall()}else{document.getElementById("inputPage").classList.add("active");renderInput()}}
document.getElementById("clearTodayBtn").addEventListener("click",()=>{if(!confirm("Очистить все данные за сегодняшний день?"))return;const d=loadData();delete d[todayKey()];saveData(d);renderInput()});document.getElementById("exportBtn").addEventListener("click",()=>{const blob=new Blob([JSON.stringify(loadData(),null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`sklad-routes-${todayKey()}.json`;a.click();URL.revokeObjectURL(a.href)});document.getElementById("importFile").addEventListener("change",e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{saveData(JSON.parse(reader.result));alert("Данные загружены");showPage()}catch(err){alert("Не удалось прочитать файл JSON")}};reader.readAsText(file)});window.addEventListener("hashchange",showPage);window.addEventListener("resize",()=>{const h=location.hash.replace(/^#/,"");if(h.startsWith("route/"))renderRouteAnalytics(decodeURIComponent(h.split("/")[1]));if(h==="overall")renderOverall()});showPage();
</script>
</body>
</html>
